# ============================================================
# IronStride — Default Configuration
# ============================================================

# --- Environment ---
env:
  command_velocity: 0.6        # Target forward velocity (m/s)
  max_episode_steps: 1000      # Steps per episode (at 50 Hz = 20 seconds)
  control_dt: 0.02             # Control timestep (seconds) — 50 Hz
  simulation_dt: 0.002         # Physics timestep (seconds) — 500 Hz
  n_substeps: 10               # sim steps per control step

  # Termination
  min_torso_height: 0.3        # Episode ends if torso z < this (meters) — relaxed for learning
  max_torso_tilt: 1.05         # Episode ends if pitch/roll > this (radians, ~60°)

# --- Reward Weights ---
reward:
  w_tracking: 1.0              # Forward velocity tracking (Gaussian)
  w_posture: 1.0               # Torso uprightness (exponential penalty)
  w_energy: 0.0001             # Joint torque penalty (normalised Σ τ²/τ_max²)
  w_symmetry: 0.1              # L/R gait symmetry penalty
  w_survival: 2.0              # Per-step survival bonus — strong stay-alive incentive
  w_height: 2.0                # Standing height tracking — teaches standing first
  target_height: 0.98          # Target pelvis z for height reward (m)

  # Tracking reward shaping
  tracking_sigma: 0.25         # Gaussian width for velocity tracking

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  friction_range: [0.7, 1.1]   # Floor friction coefficient μ (narrower for early training)
  mass_offset_range: [-2.0, 2.0]  # Torso mass perturbation (kg, reduced)
  perturbation:
    enabled: true
    force_magnitude: 15.0      # Lateral pelvic impulse (N) — halved
    probability: 0.005         # Per-step probability of applying impulse (halved)
    duration_steps: 5          # Steps to apply force over

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01               # Encourage exploration
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

# --- SAC Hyperparameters ---
sac:
  learning_rate: 3.0e-4
  buffer_size: 300000
  learning_starts: 10000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: "auto"
  target_entropy: "auto"
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

# --- Training ---
training:
  total_timesteps: 10000000    # 10M steps for full PPO run
  seed: 42
  n_envs: 8                   # More parallel environments for speed
  eval_freq: 50000             # Evaluate every 50K steps for 10M run
  eval_episodes: 5             # Episodes per evaluation
  log_dir: "logs"
  model_dir: "models"
  video_dir: "videos"
