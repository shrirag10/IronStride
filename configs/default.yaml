# ============================================================
# IronStride — Default Configuration
# ============================================================

# --- Environment ---
env:
  command_velocity: 0.6        # Target forward velocity (m/s)
  max_episode_steps: 1000      # Steps per episode (at 50 Hz = 20 seconds)
  control_dt: 0.02             # Control timestep (seconds) — 50 Hz
  simulation_dt: 0.002         # Physics timestep (seconds) — 500 Hz
  n_substeps: 10               # sim steps per control step

  # Termination
  min_torso_height: 0.8        # Episode ends if torso z < this (meters)
  max_torso_tilt: 1.05         # Episode ends if pitch/roll > this (radians, ~60°)

# --- Reward Weights ---
reward:
  w_tracking: 1.0              # Forward velocity tracking (Gaussian)
  w_posture: 0.5               # Torso uprightness (exponential penalty)
  w_energy: 0.01               # Joint torque penalty (Σ τ²)
  w_symmetry: 0.1              # L/R gait symmetry penalty
  w_survival: 0.2              # Per-step survival bonus

  # Tracking reward shaping
  tracking_sigma: 0.25         # Gaussian width for velocity tracking

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  friction_range: [0.5, 1.2]   # Floor friction coefficient μ
  mass_offset_range: [-5.0, 5.0]  # Torso mass perturbation (kg)
  perturbation:
    enabled: true
    force_magnitude: 30.0      # Lateral pelvic impulse (N)
    probability: 0.01          # Per-step probability of applying impulse
    duration_steps: 5          # Steps to apply force over

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

# --- SAC Hyperparameters ---
sac:
  learning_rate: 3.0e-4
  buffer_size: 300000
  learning_starts: 10000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: "auto"
  target_entropy: "auto"
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

# --- Training ---
training:
  total_timesteps: 1000000
  seed: 42
  n_envs: 4                   # Number of parallel environments (PPO)
  eval_freq: 10000             # Evaluate every N steps
  eval_episodes: 5             # Episodes per evaluation
  log_dir: "logs"
  model_dir: "models"
  video_dir: "videos"
