# ============================================================
# IronStride — Default Configuration
# ============================================================

# --- Environment ---
env:
  command_velocity: 0.0        # Stand still first (set >0 for walking later)
  max_episode_steps: 1000      # Steps per episode (at 50 Hz = 20 seconds)
  control_dt: 0.02             # Control timestep (seconds) — 50 Hz
  simulation_dt: 0.002         # Physics timestep (seconds) — 500 Hz
  n_substeps: 10               # sim steps per control step

  # Termination
  min_torso_height: 0.5        # Episode ends if torso z < this (meters)
  max_torso_tilt: 1.05         # Episode ends if pitch/roll > this (radians, ~60°)

# --- Reward Weights ---
reward:
  w_tracking: 0.5              # Forward velocity tracking (low priority when standing)
  w_posture: 2.0               # Torso uprightness — critical for standing
  w_energy: 0.0001             # Joint torque penalty (normalised)
  w_symmetry: 0.1              # L/R gait symmetry penalty
  w_survival: 5.0              # Per-step survival bonus — dominant signal
  w_height: 3.0                # Standing height tracking — dominant signal
  w_action_smooth: 0.5         # Action smoothness penalty (new)
  target_height: 0.98          # Target pelvis z for height reward (m)

  # Tracking reward shaping
  tracking_sigma: 0.25         # Gaussian width for velocity tracking

# --- Domain Randomization ---
domain_randomization:
  enabled: false               # Disabled for stable standing training phase
  friction_range: [0.7, 1.1]
  mass_offset_range: [-2.0, 2.0]
  perturbation:
    enabled: false
    force_magnitude: 15.0
    probability: 0.005
    duration_steps: 5

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.995                 # Higher discount = care more about future survival
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005              # Slight exploration
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

# --- SAC Hyperparameters ---
sac:
  learning_rate: 3.0e-4
  buffer_size: 300000
  learning_starts: 10000
  batch_size: 256
  tau: 0.005
  gamma: 0.995
  ent_coef: "auto"
  target_entropy: "auto"
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

# --- Training ---
training:
  total_timesteps: 10000000
  seed: 42
  n_envs: 8
  eval_freq: 50000
  eval_episodes: 5
  log_dir: "logs"
  model_dir: "models"
  video_dir: "videos"
